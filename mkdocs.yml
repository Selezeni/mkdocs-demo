# Основные метаданные сайта
site_name: Мой Блог
site_url: https://selezeni.github.io/mkdocs-demo/
site_author: Селезнёв Александр

# Copyright в футере (только твой текст, без лишнего)
copyright: © 2026 Селезнёв Александр

# Тема оформления
theme:
  name: material
  language: ru

  # Цветовая палитра — тёмная тема по умолчанию + переключатель на светлую
  palette:
    # Тёмная (slate) — основная / по умолчанию
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7 # Солнышко — переключить на светлую
        name: Переключиться на светлую тему

    # Светлая — только как запасная опция
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4 # Луна — переключить на тёмную
        name: Переключиться на тёмную тему

  # Полезные функции темы
  # features:
  #   - navigation.sections
  #   - navigation.tracking
  #   - navigation.footer
  #   - toc.integrate
  #   - content.code.copy
  #   - content.code.annotate
  #   - search.suggest
  #   - search.highlight

# Ключевой блок: полностью убирает "Made with Material for MkDocs"
extra:
  generator: false # ← это удаляет надпись навсегда

  # Социальные иконки в футере справа (настрой свои ссылки)
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/selezeni
    - icon: fontawesome/brands/telegram
      # link: https://t.me/твой_канал # ← замени на реальный

# Репозиторий + кнопка "Редактировать"
repo_url: https://github.com/selezeni/mkdocs-demo
repo_name: selezeni/mkdocs-demo
edit_uri: edit/main/docs/

# Следить за изменениями
watch:
  - docs

# Навигация
nav:
  - Главная: index.md
  - Обо Мне: about.md